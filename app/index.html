<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

    html,body{background:#050c1c;color:#e8eefc;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
    ::selection{background:rgba(56,189,248,0.3);}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:#050c1c}
    ::-webkit-scrollbar-thumb{background:#1e2f55;border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:#2d4270}
    canvas{image-rendering:auto}
    .starfield::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.25), transparent 40%),
        radial-gradient(1px 1px at 38% 72%, rgba(255,255,255,0.15), transparent 40%),
        radial-gradient(1px 1px at 72% 40%, rgba(255,255,255,0.2), transparent 40%),
        radial-gradient(1px 1px at 88% 82%, rgba(255,255,255,0.15), transparent 40%),
        radial-gradient(1px 1px at 55% 8%, rgba(255,255,255,0.2), transparent 40%),
        radial-gradient(1300px 700px at 80% -10%, rgba(56,189,248,0.08), transparent 60%),
        radial-gradient(1000px 600px at -10% 110%, rgba(52,211,153,0.06), transparent 60%);
    }
    .glass{background:linear-gradient(180deg,rgba(15,31,61,0.72),rgba(11,23,48,0.88));backdrop-filter:blur(10px);border:1px solid rgba(56,189,248,0.08);border-radius:14px;}
    .glass-hard{background:rgba(11,23,48,0.95);border:1px solid rgba(56,189,248,0.12);border-radius:14px;}
    .section-label{letter-spacing:0.16em;font-size:11px;text-transform:uppercase;color:#38bdf8;font-weight:600}
    .mono{font-family:'SF Mono','Consolas','Menlo',monospace}
    @keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 2px #ef4444)}50%{filter:drop-shadow(0 0 6px #ef4444)}}
    .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.55rem 1rem;border-radius:9px;font-weight:500;transition:all .15s;font-size:13px;border:1px solid transparent;cursor:pointer}
    .btn-primary{background:linear-gradient(180deg,#38bdf8,#0ea5e9);color:#061220;border-color:rgba(255,255,255,0.1)}
    .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
    .btn-ghost{background:rgba(30,47,85,0.4);color:#e8eefc;border-color:rgba(56,189,248,0.15)}
    .btn-ghost:hover{background:rgba(30,47,85,0.7);border-color:rgba(56,189,248,0.3)}
    .btn-active{background:linear-gradient(180deg,#38bdf8,#0ea5e9);color:#061220}
    .kbd{font-family:'SF Mono',monospace;font-size:10px;padding:2px 6px;background:#1a2a48;border-radius:4px;border:1px solid #2d4270;color:#8ea2c6}
    .accent-top::before{content:"";position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(56,189,248,0.4),transparent)}
    .tick-line{stroke:#1e2f55;stroke-dasharray:3,3}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) both}
    .smooth-appear{animation:fadeUp .35s cubic-bezier(.2,.7,.2,1) both}
  </style>
</head>
